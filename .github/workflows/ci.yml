name: VitaVoice CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install System Audio Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsndfile1

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
        pip install flake8 mypy pytest pytest-cov playwright

    - name: Install Playwright Browsers
      run: |
        playwright install chromium

    - name: Lint with Flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Type Check with Mypy
      run: |
        mypy --ignore-missing-imports backend/ ml/

    - name: Run Pytest Suite with Coverage
      run: |
        python .agents/skills/webapp-testing/scripts/with_server.py \
          --server "python -m uvicorn backend.app.main:app --port 8000" --port 8000 \
          --server "cd frontend && npm run dev" --port 5173 \
          -- pytest --cov=ml --cov=backend tests/

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci

    - name: TypeScript Compile Check
      run: |
        cd frontend
        npx tsc --noEmit

    - name: Frontend Build Verification
      run: |
        cd frontend
        npm run build --if-present
